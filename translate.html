<script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/wasm/vision_bundle.js" crossorigin="anonymous"></script>

<script src="js/vision_bundle.js"></script>

    <script>
        let gestureRecognizer;
        let video = document.getElementById('videoCam');
        let predictionText = document.getElementById('predictionText');

        // 1. تهيئة موديل جوجل بدون الحاجة لمجلد model محلي
        async function initGoogleModel() {
            if(predictionText) predictionText.innerText = "جاري الاتصال بموديل الذكاء الاصطناعي الخاص بالمشروع...";
            try {
                // استخدام خوادم unpkg المستقرة والسريعة جداً لجلب الـ wasm والموديل
                const vision = await FilesetResolver.forVisionTasks(
                    "https://unpkg.com/@mediapipe/tasks-vision@0.10.8/wasm"
                );
                gestureRecognizer = await GestureRecognizer.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: "https://unpkg.com/@mediapipe/tasks-vision@0.10.8/wasm/gesture_recognizer.task",
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO"
                });
                if(predictionText) predictionText.innerText = "النظام جاهز تماماً! اضغطي على Open Webcam";
                console.log("Google Model loaded successfully.");
            } catch (error) {
                if(predictionText) predictionText.innerText = "فشل تشغيل الموديل. يرجى التأكد من اتصال الإنترنت وتحديث الصفحة.";
                console.error(error);
            }
        }

        // تشغيل الدالة فور تحميل الصفحة
        window.onload = initGoogleModel;

        // 2. دالة تشغيل الكاميرا
        function openCam(){
           let All_mediaDevices = navigator.mediaDevices;
           if (!All_mediaDevices || !All_mediaDevices.getUserMedia) return;
           
           All_mediaDevices.getUserMedia({ video: { width: 640, height: 480 } })
           .then(function(vidStream) {
              video.srcObject = vidStream;
              video.onloadedmetadata = function() {
                 video.play();
                 predictLoop(); // البدء في الترجمة اللحظية
              };
           })
           .catch(function(e) {
              if(predictionText) predictionText.innerText = "خطأ في فتح الكاميرا.";
           });
        }

        // 3. حلقة قراءة الإشارات والترجمة الفورية
        async function predictLoop() {
            let nowInMs = Date.now();
            if (gestureRecognizer && video.readyState === video.HAVE_CURRENT_DATA) {
                const results = gestureRecognizer.recognizeForVideo(video, nowInMs);
                
                if (results.gestures.length > 0) {
                    const gestureName = results.gestures[0][0].categoryName;
                    
                    const translationMap = {
                        "None": "في انتظار إشارة واضحة...",
                        "Open_Palm": "كف مفتوح (أهلاً)",
                        "Closed_Fist": "قبضة مغلقة",
                        "Pointing_Up": "إشارة لأعلى",
                        "Thumbs_Down": "غير موافق",
                        "Thumbs_Up": "موافق",
                        "Victory": "علامة السلام / النصر",
                        "ILoveYou": "أنا أحبك (بلغة الإشارة)"
                    };

                    if(predictionText) {
                        predictionText.innerText = translationMap[gestureName] || gestureName;
                    }
                } else {
                    if(predictionText) predictionText.innerText = "ضع يدك أمام الكاميرا للترجمة...";
                }
            }
            requestAnimationFrame(predictLoop);
        }
    </script>
